<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS PRIME | Watchdog</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.85rem;
        }

        .body {
            padding: 25px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.85rem;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,60,114,0.3);
        }

        .btn-success {
            background: #00b894;
            color: white;
        }

        .btn-info {
            background: #0984e3;
            color: white;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: #00b894;
            border-color: #00b894;
            color: white;
        }

        .resumen {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-size: 0.85rem;
            color: #1e3c72;
            font-weight: 500;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            font-size: 0.85rem;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            border-top: 1px solid #e9ecef;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        table {
            width: 100%;
            font-size: 0.8rem;
        }

        td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Watchdog</h1>
            <p>Alertas por Email - Informe de inventario</p>
        </div>

        <div class="body">
            <!-- Estado -->
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="Watchdog.setEstado('activo')">
                    <i class="fas fa-check-circle"></i> Activar
                </button>
                <button class="toggle-btn" onclick="Watchdog.setEstado('inactivo')">
                    <i class="fas fa-ban"></i> Desactivar
                </button>
            </div>

            <!-- Día -->
            <div class="form-group">
                <label><i class="fas fa-calendar-day"></i> Día de envío</label>
                <select id="wdDia">
                    <option value="1">Lunes</option>
                    <option value="2">Martes</option>
                    <option value="3">Miércoles</option>
                    <option value="4">Jueves</option>
                    <option value="5">Viernes</option>
                    <option value="6">Sábado</option>
                    <option value="0">Domingo</option>
                </select>
            </div>

            <!-- Hora -->
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Hora de envío</label>
                <select id="wdHora">
                    <option value="6">06:00 AM</option>
                    <option value="7">07:00 AM</option>
                    <option value="8" selected>08:00 AM</option>
                    <option value="9">09:00 AM</option>
                    <option value="10">10:00 AM</option>
                    <option value="11">11:00 AM</option>
                    <option value="12">12:00 PM</option>
                    <option value="13">01:00 PM</option>
                    <option value="14">02:00 PM</option>
                    <option value="15">03:00 PM</option>
                    <option value="16">04:00 PM</option>
                    <option value="17">05:00 PM</option>
                    <option value="18">06:00 PM</option>
                    <option value="19">07:00 PM</option>
                    <option value="20">08:00 PM</option>
                </select>
            </div>

            <!-- Resumen -->
            <div class="resumen" id="wdResumen">
                <i class="fas fa-info-circle"></i> El informe se enviará los <strong>Lunes</strong> a las <strong>08:00 AM</strong>
            </div>

            <!-- Botones -->
            <button class="btn btn-primary" onclick="Watchdog.guardar()">
                <i class="fas fa-save"></i> Guardar configuración
            </button>
            <button class="btn btn-info" onclick="Watchdog.enviarPrueba()">
                <i class="fas fa-envelope"></i> Enviar informe ahora
            </button>

            <!-- Productos críticos -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-title">
                    <i class="fas fa-exclamation-triangle"></i>
                    Productos Críticos
                </div>
                <div id="productosCriticos">
                    <div style="text-align: center; padding: 20px; color: #888;">
                        <i class="fas fa-spinner fa-spin"></i> Cargando...
                    </div>
                </div>
            </div>

            <div id="wdMessage" class="message"></div>
        </div>

        <div class="footer">
            <i class="fas fa-shield-alt"></i> NEXUS PRIME - Sistema de Control de Inventario
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
